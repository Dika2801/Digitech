<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dika Ai Analisa Trading</title>
    <style>
        :root {
            --bg-color: #060b08;
            --primary-glow: #00ffaa;
            --robot-green: #00e699;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --card-dark: #0d1511;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(135deg, rgba(0, 255, 170, 0.03) 0%, transparent 100%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 170, 0.07) 0%, transparent 50%);
            z-index: -2;
        }

        .bg-chart-line {
            position: absolute;
            bottom: 10%; left: 0; width: 100%; height: 300px;
            opacity: 0.15; pointer-events: none; z-index: -1;
        }

        /* --- MINI ROBOT UTUH --- */
        .robot-container {
            position: fixed;
            top: 15px; left: 15px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000; animation: float 3s ease-in-out infinite;
            transform: scale(0.85);
        }

        /* POPUP SAPAAN ROBOT (TIDAK AKAN HILANG) */
        .bubble-chat {
            background: #ffffff; color: #000000; padding: 5px 12px; border-radius: 8px;
            font-size: 10px; font-weight: bold; margin-bottom: 6px; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .bubble-chat::after {
            content: ''; position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%); border-width: 5px 5px 0;
            border-style: solid; border-color: #ffffff transparent;
        }

        .mini-robot-head {
            width: 45px; height: 42px; background: #ffffff; border-radius: 15px; position: relative; border: 2px solid #cbd5e1;
        }

        .mini-robot-face {
            position: absolute; top: 6px; left: 5px; width: 31px; height: 26px; background: #0f172a; border-radius: 9px; display: flex; justify-content: space-around; align-items: center; padding: 0 4px;
        }

        .mini-robot-eye {
            width: 7px; height: 7px; background: var(--primary-glow); border-radius: 50%; box-shadow: 0 0 6px var(--primary-glow); animation: blink 4s infinite;
        }

        .mini-robot-body {
            width: 32px; height: 30px; background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px 8px 12px 12px; margin-top: -3px; position: relative;
        }

        .mini-robot-hand-left {
            position: absolute; left: -7px; top: 2px; width: 6px; height: 16px; background: #ffffff; border: 1.5px solid var(--robot-green); border-radius: 3px; transform-origin: top center; transition: 0.5s;
        }

        .mini-robot-hand-right {
            position: absolute; right: -7px; top: 2px; width: 6px; height: 16px; background: #ffffff; border: 1.5px solid #cbd5e1; border-radius: 3px; transform-origin: top center; transition: 0.5s;
        }

        /* ANIMASI BUKA LAPTOP */
        .robot-container.analyzing .mini-robot-hand-left { transform: rotate(-40deg); top: 8px; left: -2px; }
        .robot-container.analyzing .mini-robot-hand-right { transform: rotate(40deg); top: 8px; right: -2px; }

        /* LAPTOP MINI HOLOGRAM */
        .mini-laptop {
            width: 38px; height: 6px; background: #0f172a; border: 1px solid var(--primary-glow); border-radius: 2px; margin-top: 2px; opacity: 0; transform: scaleX(0); transition: 0.4s ease; position: relative;
        }
        .mini-laptop::before {
            content: ''; position: absolute; bottom: 5px; left: 6px; width: 24px; height: 18px; background: rgba(0, 255, 170, 0.2); border: 1px solid var(--primary-glow); border-radius: 2px; transform: rotateX(20deg); opacity: 0; transition: 0.4s ease;
        }

        .robot-container.analyzing .mini-laptop { opacity: 1; transform: scaleX(1); }
        .robot-container.analyzing .mini-laptop::before { opacity: 1; animation: screenGlow 0.5s ease infinite alternate; }

        .mini-robot-legs { display: flex; justify-content: space-between; width: 22px; margin-top: -2px; }
        .mini-robot-leg { width: 7px; height: 8px; background: #cbd5e1; border-radius: 0 0 3px 3px; }

        /* --- NAVBAR --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; width: 100%; }
        .logo { font-size: 22px; font-weight: 800; margin-left: 45px; }
        .logo span { color: var(--primary-glow); }

        /* --- HERO CONTAINER --- */
        .hero-container {
            display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; max-width: 1200px; margin: 30px auto; padding: 0 5%; gap: 40px;
        }

        .hero-left-art { display: flex; justify-content: center; align-items: center; }
        .big-robot-art { width: 240px; height: 250px; background: #ffffff; border-radius: 70px; position: relative; border: 5px solid #cbd5e1; box-shadow: 0 25px 50px -12px rgba(0, 255, 170, 0.2); }
        .big-robot-screen { position: absolute; top: 35px; left: 25px; width: 180px; height: 130px; background: #0f172a; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 0 25px; }
        .big-robot-eye { width: 40px; height: 40px; background: var(--primary-glow); border-radius: 50%; box-shadow: 0 0 20px var(--primary-glow); }

        .hero-right-content { width: 100%; }
        .tag-badge { background: rgba(0, 255, 170, 0.08); color: var(--primary-glow); padding: 6px 14px; border-radius: 30px; font-size: 11px; font-weight: 600; display: inline-flex; margin-bottom: 15px; }
        .hero-right-content h1 { font-size: 34px; font-weight: 700; margin-bottom: 15px; }

        .interactive-zone { background: var(--card-dark); border: 1px solid rgba(255,255,255,0.04); border-radius: 20px; padding: 20px; }

        /* --- ANIMASI TULISAN BERGERAK KE KIRI --- */
        .running-text-container {
            width: 100%; overflow: hidden; background: rgba(255, 55, 55, 0.1); border: 1px solid rgba(255, 55, 55, 0.2); padding: 8px; border-radius: 8px; margin-bottom: 15px;
        }
        .running-text {
            display: inline-block; white-space: nowrap; color: #ff5555; font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding-left: 100%; animation: marquee 15s linear infinite;
        }

        .upload-area { border: 2px dashed rgba(0, 255, 170, 0.2); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; background: rgba(0, 0, 0, 0.3); margin-bottom: 15px; }
        #preview { max-width: 100%; max-height: 180px; border-radius: 8px; display: none; margin: 0 auto; }

        .btn-action { background: var(--primary-glow); color: #030712; border: none; padding: 12px 25px; font-size: 14px; font-weight: 700; border-radius: 30px; cursor: pointer; width: 100%; justify-content: center; display: inline-flex; }
        .btn-action:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        /* --- TAB SYSTEM UNTUK HASIL EFISIEN --- */
        .result-wrapper { margin-top: 20px; display: none; background: #0a1410; border: 1px solid rgba(0, 255, 170, 0.15); border-radius: 12px; overflow: hidden; }
        .tab-header { display: flex; background: #060b08; border-bottom: 1px solid rgba(0, 255, 170, 0.1); }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-gray); font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab-btn.active { color: var(--primary-glow); background: #0a1410; border-bottom: 2px solid var(--primary-glow); }
        .tab-content { padding: 15px; font-size: 13.5px; line-height: 1.6; min-height: 120px; text-align: left; }
        
        .result-footer { padding: 10px 15px; background: #060b08; display: flex; justify-content: flex-end; border-top: 1px solid rgba(0, 255, 170, 0.05); }
        .btn-copy { background: rgba(0, 255, 170, 0.1); color: var(--primary-glow); border: 1px solid rgba(0, 255, 170, 0.3); padding: 6px 14px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; }

        .status-box { padding: 15px; color: var(--text-gray); font-size: 13px; text-align: center; display: none; }

        @media (max-width: 768px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; gap: 25px; }
            .hero-right-content h1 { font-size: 26px; }
            .big-robot-art { width: 180px; height: 190px; border-radius: 50px; }
            .big-robot-screen { width: 130px; height: 95px; }
            .big-robot-eye { width: 28px; height: 28px; }
        }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(0.85); } 50% { transform: translateY(-6px) scale(0.85); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes screenGlow { from { background: rgba(0, 255, 170, 0.15); } to { background: rgba(0, 255, 170, 0.35); } }
    </style>
</head>
<body>

    <svg class="bg-chart-line" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="none" stroke="#00ffaa" stroke-width="2" d="M0,224L60,208C120,192,240,160,360,165.3C480,171,600,213,720,208C840,203,960,149,1080,138.7C1200,128,1320,160,1380,176L1440,192"></path>
    </svg>

    <div class="robot-container" id="miniRobot">
        <div class="bubble-chat">Halo! Yuk upload chartmu..</div>
        <div class="mini-robot-head">
            <div class="mini-robot-face"><div class="mini-robot-eye"></div><div class="mini-robot-eye"></div></div>
        </div>
        <div class="mini-robot-body">
            <div class="mini-robot-hand-left"></div>
            <div class="mini-robot-hand-right"></div>
        </div>
        <div class="mini-laptop"></div>
        <div class="mini-robot-legs"><div class="mini-robot-leg"></div><div class="mini-robot-leg"></div></div>
    </div>

    <header><div class="logo">Dika <span>Ai</span></div></header>

    <main class="hero-container">
        <div class="hero-left-art">
            <div class="big-robot-art"><div class="big-robot-screen"><div class="big-robot-eye"></div><div class="big-robot-eye"></div></div></div>
        </div>

        <div class="hero-right-content">
            <div class="tag-badge">✓ Dika AI Smart Tab System Active</div>
            <h1>The Fastest and Secure<br><span style="color: var(--primary-glow);">AI Trading Assistant.</span></h1>

            <div class="interactive-zone">
                <div class="running-text-container">
                    <div class="running-text">sebelum menggunakan ai ini pastikan anda sudah memiliki api key gemini</div>
                </div>

                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
                    <div id="uploadText">
                        <p style="font-size: 22px; margin-bottom: 5px;">📊</p>
                        <p style="font-size: 12px; font-weight: 600;">Klik untuk upload screenshot chart</p>
                    </div>
                    <img id="preview" alt="Preview">
                </div>

                <button class="btn-action" id="btnAnalyze" onclick="mulaiAnalisa()" disabled>Mulai Analisa →</button>
                
                <div class="status-box" id="statusBox"></div>

                <div class="result-wrapper" id="resultWrapper">
                    <div class="tab-header">
                        <button class="tab-btn active" onclick="switchTab('trend')">📊 Trend & Market</button>
                        <button class="tab-btn" onclick="switchTab('entry')">🎯 Entry Area</button>
                        <button class="tab-btn" onclick="switchTab('tpsl')">🛡️ TP & SL</button>
                    </div>
                    <div class="tab-content" id="tabContent"></div>
                    <div class="result-footer">
                        <button class="btn-copy" onclick="copyResult()">📋 Copy Strategi</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let GEMINI_API_KEY = localStorage.getItem("DIKA_GEMINI_KEY") || ""; 
        let base64Image = "";
        let imageMimeType = "image/jpeg";
        
        let dataAnalisa = { trend: "", entry: "", tpsl: "" };

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                imageMimeType = file.type; 
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                    document.getElementById('btnAnalyze').disabled = false;
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        async function mulaiAnalisa() {
            const btn = document.getElementById('btnAnalyze');
            const statusBox = document.getElementById('statusBox');
            const resultWrapper = document.getElementById('resultWrapper');
            const robot = document.getElementById('miniRobot');
            
            if (!GEMINI_API_KEY || GEMINI_API_KEY.trim() === "") {
                const inputKey = prompt("Masukkan API Key Gemini Anda:");
                if (inputKey && inputKey.trim() !== "") {
                    GEMINI_API_KEY = inputKey.trim();
                    localStorage.setItem("DIKA_GEMINI_KEY", GEMINI_API_KEY);
                } else return;
            }

            btn.disabled = true;
            resultWrapper.style.display = "none";
            statusBox.style.display = "block";
            statusBox.innerHTML = "Robot membuka laptop...<br>Mengalkulasi struktur candlestick via Gemini API...";
            
            robot.classList.add('analyzing');

            const promptNarasi = "Analisa chart trading ini. Kamu wajib memberikan respon dengan memisahkannya ke dalam 3 bagian menggunakan format tag persis seperti ini:\n[TREND] tulis analisa tren, struktur pasar, dan indikator di sini [/TREND]\n[ENTRY] tulis rekomendasi posisi buy/sell/wait dan angka harga masuk di sini [/ENTRY]\n[TPSL] tulis target angka batas take profit dan stop loss di sini [/TPSL]";

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const payload = { contents: [{ parts: [{ text: promptNarasi }, { inlineData: { mimeType: imageMimeType, data: base64Image } }] }] };

            try {
                const response = await fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                const data = await response.json();
                
                if (data.error) {
                    statusBox.innerHTML = `<span style='color:#ff5555;'>Error:</span> ${data.error.message} <button onclick='localStorage.removeItem(\"DIKA_GEMINI_KEY\"); location.reload();'>Reset Key</button>`;
                    robot.classList.remove('analyzing');
                    return;
                }

                const textHasil = data.candidates[0].content.parts[0].text;
                
                dataAnalisa.trend = parseTag(textHasil, "TREND");
                dataAnalisa.entry = parseTag(textHasil, "ENTRY");
                dataAnalisa.tpsl = parseTag(textHasil, "TPSL");

                if(!dataAnalisa.trend) dataAnalisa.trend = textHasil;

                statusBox.style.display = "none";
                resultWrapper.style.display = "block";
                switchTab('trend');

            } catch (error) {
                statusBox.innerHTML = "<span style='color:#ff5555;'>Gagal menyambung ke server Google Studio.</span>";
            } finally {
                btn.disabled = false;
                robot.classList.remove('analyzing');
            }
        }

        function parseTag(text, tag) {
            const regex = new RegExp(`\\[${tag}\\]([\\s\\S]*?)\\[\\/${tag}\\]`, "i");
            const match = text.match(regex);
            return match ? match[1].trim().replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>') : "";
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tabContent').innerHTML = dataAnalisa[tabName] || "Data tidak ditemukan.";
            
            const indexMap = { 'trend': 0, 'entry': 1, 'tpsl': 2 };
            document.querySelectorAll('.tab-btn')[indexMap[tabName]].classList.add('active');
        }

        function copyResult() {
            const gabunganTeks = `== STRATEGI DIKA AI ==\n\n[1. Trend & Market]\n${dataAnalisa.trend.replace(/<br>/g, '\n').replace(/<\/?[^>]+(>|$)/g, "")}\n\n[2. Entry Area]\n${dataAnalisa.entry.replace(/<br>/g, '\n').replace(/<\/?[^>]+(>|$)/g, "")}\n\n[3. Target TP & SL]\n${dataAnalisa.tpsl.replace(/<br>/g, '\n').replace(/<\/?[^>]+(>|$)/g, "")}`;
            navigator.clipboard.writeText(gabunganTeks);
            alert("Strategi trading berhasil disalin!");
        }
    </script>
</body>
    </html>
