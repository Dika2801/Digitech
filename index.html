<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dika Ai Analisa Trading</title>
    <!-- Memanggil Library Penerjemah NPY Langsung dari Internet -->
    <script src="https://cdn.jsdelivr.net/npm/npyjs@0.x/dist/npy.js"></script>
    <style>
        /* --- TEMA CORE: DARK GREEN NEON LOKAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050a0e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background-color: #0b1219;
            border: 1px solid #16222f;
            border-radius: 24px;
            padding: 20px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .marquee-alert {
            background-color: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.25);
            color: #00ff88;
            font-size: 11px;
            font-weight: 800;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .token-area {
            position: relative;
            margin-bottom: 20px;
            padding-top: 35px;
        }

        .robot-chibi-melayang {
            width: 65px;
            height: 65px;
            background-image: url('https://img.freepik.com/free-vector/floating-robot-cartoon-vector-illustration_138676-2744.jpg');
            background-size: cover;
            position: absolute;
            top: -25px;
            left: 35px;
            z-index: 10;
            filter: drop-shadow(0 0 8px #00ff88);
            animation: floatRobot 3s infinite ease-in-out;
        }

        .flex-input {
            display: flex;
            gap: 10px;
        }
        .input-mock {
            flex: 1;
            background-color: #070d14;
            border: 1px solid #1f2d3d;
            border-radius: 10px;
            padding: 12px;
            color: #4b5563;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .btn-reset {
            background-color: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .link-buat-api {
            display: block;
            text-align: center;
            font-size: 11px;
            color: #00ff88;
            font-weight: 700;
            text-decoration: none;
            margin-top: 10px;
            background: rgba(0, 255, 136, 0.05);
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed rgba(0, 255, 136, 0.2);
        }

        .tab-menu {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab-item {
            flex: 1;
            background-color: #0d1720;
            border: 1px solid #1e293b;
            padding: 10px 5px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .tab-item.active {
            background-color: rgba(0, 255, 136, 0.05);
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .dropzone-chart {
            border: 2px dashed #162e26;
            background-color: #070d14;
            border-radius: 16px;
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .dropzone-inner {
            text-align: center;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
        }
        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            background-color: #02060c;
        }

        .btn-mulai-analisa {
            width: 100%;
            background-color: #00ff88;
            color: #050a0e;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .panel-hasil-lokal {
            background: linear-gradient(180deg, #0d1722, #080f16);
            border: 1px solid #1e3a2f;
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
        }
        .judul-tren-bullish { color: #00ff88; font-weight: 800; font-size: 16px; text-align: center; }
        .judul-tren-bearish { color: #ef4444; font-weight: 800; font-size: 16px; text-align: center; }

        .footer-cr {
            text-align: center;
            font-size: 10px;
            color: #334155;
            margin-top: 25px;
            line-height: 1.5;
            font-weight: 500;
        }

        @keyframes floatRobot {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusLoad" class="marquee-alert">
            MENGHUBUNGKAN LANGSUNG KE DATA .NPY AI...
        </div>

        <div class="token-area">
            <div class="robot-chibi-melayang"></div>
            <div class="flex-input">
                <input type="text" class="input-mock" value="••••••••••••••••••••••••••••••••••••••••" disabled />
                <button class="btn-reset">Reset</button>
            </div>
            <a href="#" class="link-buat-api">
                🔗 TERHUBUNG LANGSUNG KE FILE MATRIKS ASLI LU
            </a>
        </div>

        <div class="tab-menu">
            <div class="tab-item active" onclick="pilihTab(this)">⏱ Scalping</div>
            <div class="tab-item" onclick="pihalTab(this)">📅 Day Trading</div>
            <div class="tab-item" onclick="pilihTab(this)">🌊 Swing</div>
        </div>

        <label class="dropzone-chart" id="boxKlik">
            <div class="dropzone-inner" id="textDefault">
                <span style="font-size: 28px; display: block; margin-bottom: 5px;">🖼</span>
                Ketuk Untuk Pilih Screenshot Chart
            </div>
            <input type="file" id="inputFile" class="hidden" accept="image/*" />
            <img id="viewChart" class="preview-img hidden" />
        </label>

        <button id="btnKlikAnalisa" class="btn-mulai-analisa hidden" disabled>Memuat Memori AI...</button>

        <canvas id="canvasMataAI" width="32" height="32" class="hidden"></canvas>

        <div id="panelLaporan" class="panel-hasil-lokal hidden">
            <div id="isiKonten"></div>
        </div>

        <div class="footer-cr">
            copyright 2026 oleh Andika<br>seluruh lisensi berizin dan dilindungi undang-undang
        </div>
    </div>

    <script>
        const inputFile = document.getElementById('inputFile');
        const viewChart = document.getElementById('viewChart');
        const textDefault = document.getElementById('textDefault');
        const btnKlikAnalisa = document.getElementById('btnKlikAnalisa');
        const panelLaporan = document.getElementById('panelLaporan');
        const isiKonten = document.getElementById('isiKonten');
        const canvas = document.getElementById('canvasMataAI');
        const ctx = canvas.getContext('2d');
        const statusLoad = document.getElementById('statusLoad');

        let bobotAsli = null;
        let biasAsli = null;

        // SEED NYJPS: MEMBACA LANGSUNG FILE .NPY UTUH DI REPOSITORY
        const npy = new npyjs();
        
        Promise.all([
            npy.load('bobot.npy'),
            npy.load('bias.npy')
        ]).then(([bobotData, biasData]) => {
            bobotAsli = bobotData.data; 
            biasAsli = biasData.data;
            
            statusLoad.innerText = "🤖 MEMORI DATA AI AKTIF & ONLINE!";
            statusLoad.style.borderColor = "#00ff88";
            btnKlikAnalisa.innerText = "Mulai Analisa →";
            btnKlikAnalisa.disabled = false;
        }).catch(err => {
            statusLoad.innerText = "❌ GAGAL MEMBACA FILE .NPY LU";
            statusLoad.style.color = "#ef4444";
            console.error(err);
        });

        function pilihTab(elemen) {
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            elemen.classList.add('active');
        }

        inputFile.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    viewChart.src = e.target.result;
                    viewChart.classList.remove('hidden');
                    textDefault.classList.add('hidden');
                    btnKlikAnalisa.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // PROSES HITUNG FEEDFORWARD ASLI DARI FILE NYATA LU
        btnKlikAnalisa.addEventListener('click', function() {
            if(!bobotAsli || !biasAsli) return;

            btnKlikAnalisa.innerText = "Deep Learning Matrix Processing...";
            btnKlikAnalisa.disabled = true;

            setTimeout(() => {
                ctx.drawImage(viewChart, 0, 0, 32, 32);
                const imgData = ctx.getImageData(0, 0, 32, 32).data;

                let dotProduct = 0;
                let idx = 0;

                // Membedah 1024 kombinasi baris piksel gambar asli
                for (let i = 0; i < imgData.length; i += 4) {
                    let grayscale = (imgData[i] + imgData[i+1] + imgData[i+2]) / 3 / 255.0;
                    if(idx < bobotAsli.length) {
                        dotProduct += grayscale * bobotAsli[idx];
                        idx++;
                    }
                }

                // Masuk ke Rumus Aktivasi Jaringan Saraf Tiruan Asli Lu
                let netInput = dotProduct + biasAsli[0];
                let prediksiAktif = 1 / (1 + Math.exp(-netInput));

                panelLaporan.classList.remove('hidden');
                
                let isBullish = prediksiAktif >= 0.5;
                let trenTerpilih = isBullish ? 'BULLISH' : 'BEARISH';
                let kekuatan = isBullish ? (prediksiAktif * 100).toFixed(2) : ((1 - prediksiAktif) * 100).toFixed(2);

                let aksi = isBullish ? 'BUY (Ambil Posisi Atas)' : 'SELL (Ambil Posisi Bawah)';
                let entry = isBullish ? 'Tunggu koreksi di zona Support terdekat' : 'Cari entri saat harga naik mendekati area Resistance';
                let alasan = isBullish 
                    ? 'AI mendeteksi struktur visual grafik menyerupai pola akumulasi buy. Kombinasi warna dan piksel menunjukkan penolakan harga di area bawah (rejection), sehingga momentum kenaikan jangka pendek memiliki peluang lebih besar.' 
                    : 'AI mendeteksi formasi piksel grafik menyerupai pola distribusi/tekanan jual. Struktur grafik cenderung membuat batas atas yang semakin menurun (lower high), menandakan seller sedang mengambil kendali.';

                isiKonten.innerHTML = `
                    <div class="${isBullish ? 'judul-tren-bullish' : 'judul-tren-bearish'}" style="margin-bottom:10px;">
                        ${isBullish ? '📈' : '📉'} TREN UTAMA: ${trenTerpilih}
                    </div>
                    <div style="font-size:12px; color:#e2e8f0; line-height:1.6; font-weight:600;">
                        <p style="color:#fbbf24; text-align:center; margin-bottom:12px;">🔥 Kekuatan Sinyal Otak AI: ${kekuatan}%</p>
                        <div style="border-top:1px solid #1e293b; padding-top:8px; margin-top:5px;">
                            <span style="color:#00ff88;">📌 SETUP STRATEGI ASLI:</span><br>
                            • Aksi Posisi : <b>${aksi}</b><br>
                            • Area Entry  : ${entry}<br>
                            • Target Profit: 20-30 Pips cepat<br>
                            • Batas Risiko : Ketat di ekor candle terluar
                        </div>
                        <div style="margin-top:10px; font-size:11px; color:#64748b; font-weight:500;">
                            <span style="color:#94a3b8; font-weight:700;">🧐 ALASAN DEEP LEARNING BERBASIS .NPY ASLI:</span><br>
                            ${alasan}
                        </div>
                    </div>
                `;
                
                btnKlikAnalisa.innerText = "Mulai Analisa →";
                btnKlikAnalisa.disabled = false;
            }, 1200); 
        });
    </script>
</body>
</html>
